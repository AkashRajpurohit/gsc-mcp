name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test
      - run: npm publish
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            /^## \[/ {if (flag) exit}
            flag {print}
          ' CHANGELOG.md)
          [ -z "$NOTES" ] && NOTES="Release $TAG."
          NOTES="$NOTES

          **Full changelog:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md"
          gh release create "$TAG" --title "$TAG" --notes "$NOTES" --verify-tag

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test
      - name: Check tag matches package.json version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version $PKG. Bump the version and update the CHANGELOG before tagging."
            exit 1
          fi
      - name: Publish to npm
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already published; skipping publish."
          else
            npm publish
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            /^## \[/ {if (flag) exit}
            flag {print}
          ' CHANGELOG.md)
          [ -z "$NOTES" ] && NOTES="Release $TAG."
          NOTES="$NOTES

          **Full changelog:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
          else
            gh release create "$TAG" --title "$TAG" --notes "$NOTES" --verify-tag
          fi

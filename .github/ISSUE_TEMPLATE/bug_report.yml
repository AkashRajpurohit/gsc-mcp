name: Bug report
description: Something is not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not paste your service-account key or any secret values.
  - type: input
    id: version
    attributes:
      label: gsc-mcp version
      description: Output of `npx @akashrajpurohit/gsc-mcp --version`, or your local commit.
      placeholder: "0.4.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v22.5.0"
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      description: For example Claude Code, Claude Desktop, Cursor, or the CLI.
      placeholder: "Claude Code"
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Output of `npx @akashrajpurohit/gsc-mcp doctor`. It does not contain secrets.
      render: text
    validations:
      required: false
